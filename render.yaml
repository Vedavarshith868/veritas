services:
  - type: web
    name: veritas-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: B2_KEY_ID
        sync: false
      - key: B2_APP_KEY
        sync: false
      - key: B2_BUCKET
        sync: false
      - key: B2_REGION
        value: us-east-005
      - key: B2_ENDPOINT
        value: https://s3.us-east-005.backblazeb2.com
      - key: GMI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: B2_LOCKED_BUCKET
        sync: false
      - key: B2_LOCKED_KEY_ID
        sync: false
      - key: B2_LOCKED_APP_KEY
        sync: false
      - key: VERITAS_PREFIX
        value: veritas
      - key: PRESIGN_EXPIRY_SECONDS
        value: "3600"
      - key: VERITAS_PROVIDER
        value: auto
      - key: CORS_ORIGINS
        sync: false
      # Per-IP rate limits — bump if you're doing a heavy demo. Format is
      # slowapi's "<count>/<period>" (e.g. "20/hour", "1/minute").
      - key: RATE_LIMIT_GENERATE
        value: "10/hour"
      - key: RATE_LIMIT_CAMPAIGN
        value: "3/hour"
      - key: RATE_LIMIT_VERIFY
        value: "60/hour"
