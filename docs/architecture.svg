<svg viewBox="0 0 1440 1080" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#facc15"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#55555c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1440" height="1080" fill="#08080a"/>

  <!-- Title -->
  <text x="40" y="52" fill="#facc15" font-size="15" font-weight="700" letter-spacing="2">VERITAS</text>
  <text x="40" y="86" fill="#fafafa" font-size="30" font-weight="800">Provenance pipeline — prompt to cryptographic proof</text>
  <text x="40" y="112" fill="#8b8b92" font-size="14">Every box below is a real Genblaze call or a real Backblaze B2 object — not an aspirational diagram.</text>

  <!-- ===== Row 1: high-level flow ===== -->
  <g font-size="16" font-weight="700" fill="#fafafa">
    <rect x="40"  y="145" width="300" height="64" rx="14" fill="#131315" stroke="#2b2b30"/>
    <text x="190" y="183" text-anchor="middle">PROMPT</text>

    <rect x="380" y="145" width="330" height="64" rx="14" fill="#1a1608" stroke="#facc15"/>
    <text x="545" y="183" text-anchor="middle" fill="#facc15">GENBLAZE PIPELINE</text>

    <rect x="750" y="145" width="330" height="64" rx="14" fill="#0d1712" stroke="#3ecf8e"/>
    <text x="915" y="183" text-anchor="middle" fill="#3ecf8e">BACKBLAZE B2</text>

    <rect x="1120" y="145" width="280" height="64" rx="14" fill="#131315" stroke="#2b2b30"/>
    <text x="1260" y="183" text-anchor="middle">PROOF SURFACES</text>
  </g>
  <path d="M340,177 H380" stroke="#facc15" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M710,177 H750" stroke="#facc15" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1080,177 H1120" stroke="#facc15" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- connector down into Genblaze detail card -->
  <path d="M545,209 V236" stroke="#3a3a40" stroke-width="2" marker-end="url(#arrowMuted)"/>

  <!-- ===== Row 2: Genblaze orchestration detail ===== -->
  <rect x="40" y="246" width="1360" height="248" rx="16" fill="#101012" stroke="#232326"/>
  <text x="66" y="280" fill="#facc15" font-size="13" font-weight="700" letter-spacing="1.5">GENBLAZE ORCHESTRATION</text>

  <!-- step 1 -->
  <rect x="66" y="298" width="430" height="112" rx="12" fill="#151517" stroke="#2b2b30"/>
  <text x="90" y="326" fill="#fafafa" font-size="17" font-weight="700">Step 1 · Replicate</text>
  <text x="90" y="350" fill="#c9c9cc" font-size="14" font-family="Consolas, monospace">black-forest-labs/flux-schnell</text>
  <text x="90" y="372" fill="#8b8b92" font-size="13">image generation · real https:// CDN asset</text>
  <text x="90" y="394" fill="#6c6c72" font-size="12">fallback_models=[...] · RetryPolicy</text>

  <path d="M496,354 H548" stroke="#facc15" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- step 2 -->
  <rect x="548" y="298" width="470" height="112" rx="12" fill="#151517" stroke="#2b2b30"/>
  <text x="572" y="326" fill="#fafafa" font-size="17" font-weight="700">Step 2 · NVIDIA (input_from=0)</text>
  <text x="572" y="350" fill="#c9c9cc" font-size="14" font-family="Consolas, monospace">meta/llama-3.2-11b-vision-instruct</text>
  <text x="572" y="372" fill="#8b8b92" font-size="13">captions step 1's own output — cross-provider chain</text>
  <text x="572" y="394" fill="#6c6c72" font-size="12">fallback: llama-3.2-90b-vision-instruct</text>

  <!-- both steps -> one manifest -->
  <path d="M1018,354 H1050" stroke="#facc15" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="1050" y="316" width="290" height="76" rx="10" fill="#1a1608" stroke="#facc15"/>
  <text x="1195" y="345" text-anchor="middle" fill="#facc15" font-size="14" font-weight="700">ONE signed manifest</text>
  <text x="1195" y="365" text-anchor="middle" fill="#c9a642" font-size="12">Manifest.verify() before any UI shows "verified"</text>

  <!-- orchestration chip row -->
  <g font-size="12.5" fill="#c9c9cc">
    <rect x="66"  y="430" width="248" height="40" rx="20" fill="#0e0e10" stroke="#2b2b30"/>
    <text x="190" y="455" text-anchor="middle">batch_run(max_concurrency=3)</text>

    <rect x="326" y="430" width="230" height="40" rx="20" fill="#0e0e10" stroke="#2b2b30"/>
    <text x="441" y="455" text-anchor="middle">fail_fast=False</text>

    <rect x="568" y="430" width="270" height="40" rx="20" fill="#0e0e10" stroke="#2b2b30"/>
    <text x="703" y="455" text-anchor="middle">parent_run_id (lineage)</text>

    <rect x="850" y="430" width="230" height="40" rx="20" fill="#0e0e10" stroke="#2b2b30"/>
    <text x="965" y="455" text-anchor="middle">project_id (campaigns)</text>

    <rect x="1092" y="430" width="248" height="40" rx="20" fill="#0e0e10" stroke="#2b2b30"/>
    <text x="1216" y="455" text-anchor="middle">GMI Cloud fallback chain</text>
  </g>

  <!-- connector down into B2 row -->
  <path d="M720,494 V521" stroke="#3a3a40" stroke-width="2" marker-end="url(#arrowMuted)"/>

  <!-- ===== Row 3: B2 buckets ===== -->
  <text x="40" y="518" fill="#3ecf8e" font-size="13" font-weight="700" letter-spacing="1.5">BACKBLAZE B2 — THE ENTIRE SYSTEM OF RECORD (NO DATABASE)</text>

  <!-- bucket A: main -->
  <rect x="40" y="532" width="660" height="380" rx="16" fill="#0c0f0d" stroke="#22452f"/>
  <text x="66" y="566" fill="#fafafa" font-size="18" font-weight="800">veritas2</text>
  <text x="150" y="566" fill="#7fdba9" font-size="13">main bucket · private · presigned GET</text>

  <g font-size="13.5" fill="#b9e9cf" font-family="Consolas, monospace">
    <text x="66" y="602">veritas/runs/&lt;date&gt;/&lt;run_id&gt;/manifest.json</text>
    <text x="66" y="628">veritas/runs/&lt;date&gt;/&lt;run_id&gt;/assets/&lt;asset_id&gt;.&lt;ext&gt;</text>
    <text x="66" y="654">veritas/index/sha256/&lt;hash&gt;.json</text>
    <text x="66" y="680">veritas/index/by-provider/&lt;provider&gt;/&lt;run_id&gt;.json</text>
    <text x="66" y="706">veritas/index/by-campaign/&lt;campaign_id&gt;/&lt;run_id&gt;.json</text>
  </g>
  <g font-size="12" fill="#6fae87">
    <text x="600" y="602" text-anchor="end">provenance record</text>
    <text x="600" y="628" text-anchor="end">the media itself</text>
    <text x="600" y="654" text-anchor="end">O(1) verify lookup</text>
    <text x="600" y="680" text-anchor="end">by-provider query</text>
    <text x="600" y="706" text-anchor="end">by-campaign query</text>
  </g>

  <line x1="66" y1="730" x2="674" y2="730" stroke="#1c3a28"/>
  <text x="66" y="756" fill="#c9c9cc" font-size="13" font-weight="700">Self-describing objects</text>
  <text x="66" y="778" fill="#8b8b92" font-size="12.5">
    <tspan x="66" dy="0">Server-side copy (MetadataDirective=REPLACE) stamps every asset with</tspan>
    <tspan x="66" dy="20">veritas-provider / veritas-model / veritas-run-id / veritas-sha256 —</tspan>
    <tspan x="66" dy="20">zero bandwidth cost, readable by any S3 tool, not just this app.</tspan>
  </text>
  <text x="66" y="882" fill="#fafafa" font-size="14" font-weight="700">28 passing tests · GitHub Actions CI on every push</text>

  <!-- bucket B: locked/WORM -->
  <rect x="740" y="532" width="660" height="380" rx="16" fill="#14100a" stroke="#5a4111"/>
  <text x="766" y="566" fill="#fafafa" font-size="18" font-weight="800">veritas1</text>
  <text x="850" y="566" fill="#facc15" font-size="13">Object Lock · COMPLIANCE mode</text>

  <g font-size="13.5" fill="#f0d98a" font-family="Consolas, monospace">
    <text x="766" y="602">locked-manifests/&lt;run_id&gt;.json</text>
    <text x="766" y="628">retain_until = created_at + 30 days</text>
    <text x="766" y="654">mode = COMPLIANCE</text>
  </g>
  <g font-size="12" fill="#b9924a">
    <text x="1300" y="602" text-anchor="end">write-once manifest copy</text>
    <text x="1300" y="628" text-anchor="end">configurable retention window</text>
    <text x="1300" y="654" text-anchor="end">nobody can shorten it early</text>
  </g>

  <line x1="766" y1="678" x2="1374" y2="678" stroke="#3a2c10"/>
  <text x="766" y="706" fill="#facc15" font-size="13" font-weight="700">Adversarially tested, not just implemented</text>
  <rect x="766" y="722" width="608" height="118" rx="8" fill="#0a0a0b" stroke="#2b2b30"/>
  <text x="786" y="748" fill="#3ecf8e" font-size="12.5" font-family="Consolas, monospace">$ aws s3api delete-object --bucket veritas1 \</text>
  <text x="786" y="770" fill="#3ecf8e" font-size="12.5" font-family="Consolas, monospace">    --key locked-manifests/&lt;run_id&gt;.json --version-id ...</text>
  <text x="786" y="800" fill="#e8677a" font-size="12.5" font-family="Consolas, monospace">AccessDenied — even the account owner can't delete early.</text>

  <text x="766" y="882" fill="#fafafa" font-size="14" font-weight="700">Per-IP rate limiting (slowapi) on every write / verify endpoint</text>

  <!-- connector down into proof row -->
  <path d="M720,912 V939" stroke="#3a3a40" stroke-width="2" marker-end="url(#arrowMuted)"/>

  <!-- ===== Row 4: proof surfaces ===== -->
  <text x="40" y="936" fill="#facc15" font-size="13" font-weight="700" letter-spacing="1.5">WHAT ANYONE CAN CHECK — NO LOGIN REQUIRED</text>

  <g font-size="13.5">
    <rect x="40"   y="952" width="258" height="98" rx="12" fill="#131315" stroke="#2b2b30"/>
    <text x="62" y="980" fill="#fafafa" font-weight="700">/verify</text>
    <text x="62" y="1002" fill="#8b8b92" font-size="12">Drop any file → O(1) sha-256</text>
    <text x="62" y="1020" fill="#8b8b92" font-size="12">match against the B2 index</text>

    <rect x="312" y="952" width="258" height="98" rx="12" fill="#131315" stroke="#2b2b30"/>
    <text x="334" y="980" fill="#fafafa" font-weight="700">/certificate</text>
    <text x="334" y="1002" fill="#8b8b92" font-size="12">Signed JSON + printable HTML,</text>
    <text x="334" y="1020" fill="#8b8b92" font-size="12">WORM lock status included</text>

    <rect x="584" y="952" width="258" height="98" rx="12" fill="#131315" stroke="#2b2b30"/>
    <text x="606" y="980" fill="#fafafa" font-weight="700">/embed · badge.js</text>
    <text x="606" y="1002" fill="#8b8b92" font-size="12">4KB Shadow-DOM script any</text>
    <text x="606" y="1020" fill="#8b8b92" font-size="12">third-party site can drop in</text>

    <rect x="856" y="952" width="258" height="98" rx="12" fill="#131315" stroke="#2b2b30"/>
    <text x="878" y="980" fill="#fafafa" font-weight="700">/api/stats</text>
    <text x="878" y="1002" fill="#8b8b92" font-size="12">Live counts computed fresh</text>
    <text x="878" y="1020" fill="#8b8b92" font-size="12">from B2 — no hidden database</text>

    <rect x="1128" y="952" width="272" height="98" rx="12" fill="#131315" stroke="#2b2b30"/>
    <text x="1150" y="980" fill="#fafafa" font-weight="700">/runs/by-provider · by-campaign</text>
    <text x="1150" y="1002" fill="#8b8b92" font-size="12">Secondary-index prefix scans,</text>
    <text x="1150" y="1020" fill="#8b8b92" font-size="12">not full-manifest scans</text>
  </g>

  <text x="1400" y="1068" fill="#55555c" font-size="12" text-anchor="end">veritas-ebon-rho.vercel.app · github.com/Vedavarshith868/veritas</text>
</svg>
